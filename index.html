<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo-3.png" />
    <title>Tech Trailblazers Tribe | Building What Matters</title>
    
    <!-- Static <head> defaults only. Per-page SEO (title, description, canonical,
         Open Graph, Twitter, and JSON-LD) is managed at runtime by
         react-helmet-async via src/components/Seo.tsx, and baked into each
         route's HTML at build time by the prerender step. -->
    <meta name="author" content="Tech Trailblazers Tribe" />
    <meta name="language" content="English" />

    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
